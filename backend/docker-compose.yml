version: '3.8'

services:
  postgres-db:
    image: postgres:15
    container_name: linketinder_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: linketinder
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql


  linketinder-app:
    build: .
    container_name: linketinder_api
    depends_on:
      - postgres-db
    ports:
      - "8080:8080"